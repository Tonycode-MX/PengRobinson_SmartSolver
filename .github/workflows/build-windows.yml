name: Compilar PR-SmartSolver para Windows

on:
  push:
    branches: [ "app_desktop" ]
  workflow_dispatch: 

jobs:
  build_windows:
    runs-on: windows-latest # Aquí pedimos una máquina con Windows

    # Forzamos el uso de bash para que los comandos funcionen igual que en Mac
    defaults:
      run:
        shell: bash

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r eviroment/requirements.txt
        pip install pyinstaller

    - name: Crear archivo .env temporal
      run: |
        touch .env
        echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> .env
        echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env

    - name: Compilar con PyInstaller
      run: |
        # ATENCIÓN: En Windows el separador de --add-data es punto y coma (;)
        pyinstaller --noconfirm --onefile --windowed \
        --add-data "frontend/index.html;." \
        --add-data ".env;." \
        --hidden-import "uvicorn" --hidden-import "fastapi" --hidden-import "pydantic" \
        --hidden-import "langchain" --hidden-import "langchain_core" --hidden-import "langchain_google_genai" \
        --hidden-import "langchain_groq" --hidden-import "langgraph" --hidden-import "CoolProp" \
        --hidden-import "dotenv" --hidden-import "sqlalchemy" --hidden-import "PIL" \
        backend/main.py

    - name: Subir el archivo terminado
      uses: actions/upload-artifact@v4
      with:
        name: PR-SmartSolver-Windows
        path: dist/main.exe
