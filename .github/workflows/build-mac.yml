name: Compilar PR-SmartSolver para macOS

on:
  push:
    branches: [ "app_desktop" ]
  workflow_dispatch: 

jobs:
  build_macos:
    runs-on: macos-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        # Usamos la ruta exacta que apareció en tu consola de Git
        pip install -r eviroment/requirements.txt
        pip install pyinstaller

    - name: Crear archivo .env temporal
      run: |
        # Creamos el archivo directamente en la raíz del repositorio
        touch .env
        echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> .env
        # Si tienes más API keys, descomenta la siguiente línea:
        # echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env

    - name: Compilar con PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed \
        --add-data "frontend/index.html:." \
        --add-data ".env:." \
        --hidden-import "uvicorn" --hidden-import "fastapi" --hidden-import "pydantic" \
        --hidden-import "langchain" --hidden-import "langchain_core" --hidden-import "langchain_google_genai" \
        --hidden-import "langchain_groq" --hidden-import "langgraph" --hidden-import "CoolProp" \
        --hidden-import "dotenv" --hidden-import "sqlalchemy" --hidden-import "PIL" \
        backend/main.py

    - name: Comprimir la aplicación de forma segura (Formato Mac)
      run: |
        cd dist
        # Esto crea un ZIP nativo de Mac conservando todos los permisos internos
        zip -r PR-SmartSolver.zip main.app

    - name: Subir el archivo terminado
      uses: actions/upload-artifact@v4
      with:
        name: PR-SmartSolver-macOS
        path: dist/PR-SmartSolver.zip
