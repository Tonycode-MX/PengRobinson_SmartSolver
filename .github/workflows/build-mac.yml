name: Compilar PR-SmartSolver para macOS

on:
  push:
    branches: [ "app_desktop" ]
  workflow_dispatch: 

jobs:
  build_macos:
    runs-on: macos-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Crear archivo .env temporal
      run: |
        touch PengRobinson_SmartSolver/.env
        echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> PengRobinson_SmartSolver/.env
        # Si tienes más API keys, descomenta la siguiente línea y pon el nombre correcto:
        # echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> PengRobinson_SmartSolver/.env

    - name: Compilar con PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed \
        --add-data "PengRobinson_SmartSolver/frontend/index.html:." \
        --add-data "PengRobinson_SmartSolver/.env:." \
        --hidden-import "uvicorn" --hidden-import "fastapi" --hidden-import "pydantic" \
        --hidden-import "langchain" --hidden-import "langchain_core" --hidden-import "langchain_google_genai" \
        --hidden-import "langchain_groq" --hidden-import "langgraph" --hidden-import "CoolProp" \
        --hidden-import "dotenv" --hidden-import "sqlalchemy" --hidden-import "PIL" \
        PengRobinson_SmartSolver/backend/main.py

    - name: Subir el archivo terminado
      uses: actions/upload-artifact@v4
      with:
        name: PR-SmartSolver-macOS
        path: dist/main.app
